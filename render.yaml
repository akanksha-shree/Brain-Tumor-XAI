services:
  - type: web
    name: braintumorxai-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MODEL_URL
        sync: false   # set this manually in the Render dashboard (see README)
